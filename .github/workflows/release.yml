name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: photo-sorter
            asset_name: photo-sorter-linux-amd64
          - os: macos-latest
            artifact_name: photo-sorter
            asset_name: photo-sorter-macos-amd64
          - os: windows-latest
            artifact_name: photo-sorter.exe
            asset_name: photo-sorter-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Build executable
        run: uv run python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/photo-sorter-linux-amd64/photo-sorter
            artifacts/photo-sorter-macos-amd64/photo-sorter
            artifacts/photo-sorter-windows-amd64.exe/photo-sorter.exe
          generate_release_notes: true
