name: Build and Release

on:
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: photo-sorter
            asset_name: photo-sorter-linux-amd64
          - os: macos-latest
            artifact_name: photo-sorter
            asset_name: photo-sorter-macos-amd64
          - os: windows-latest
            artifact_name: photo-sorter.exe
            asset_name: photo-sorter-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Build executable
        run: uv run python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      # Each matrix build names its output "photo-sorter" / "photo-sorter.exe". Release
      # assets are keyed by filename, so we stage unique names (matching matrix asset_name).
      - name: Stage release assets
        run: |
          set -e
          mkdir -p release-assets
          cp "artifacts/photo-sorter-linux-amd64/photo-sorter" "release-assets/photo-sorter-linux-amd64"
          cp "artifacts/photo-sorter-macos-amd64/photo-sorter" "release-assets/photo-sorter-macos-amd64"
          cp "artifacts/photo-sorter-windows-amd64.exe/photo-sorter.exe" "release-assets/photo-sorter-windows-amd64.exe"
          chmod +x release-assets/photo-sorter-linux-amd64 release-assets/photo-sorter-macos-amd64
          ls -la release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
